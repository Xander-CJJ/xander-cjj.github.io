<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xander | 个人网站</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: #202124;
      background: #f7f8fa;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      line-height: 1.7;
    }

    main {
      width: min(760px, calc(100% - 40px));
      margin: 0 auto;
      padding: 72px 0;
    }

    header {
      display: flex;
      align-items: center;
      gap: 28px;
      margin-bottom: 64px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
    }

    h1 {
      margin: 0;
      font-size: 42px;
    }

    h2 { margin-top: 40px; }

    .subtitle {
      margin: 6px 0 0;
      color: #62676f;
    }

    a {
      color: #0969da;
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    footer {
      margin-top: 64px;
      color: #62676f;
      font-size: 14px;
    }

    @media (max-width: 560px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      h1 { font-size: 34px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <img class="avatar"
           src="https://github.com/Xander-CJJ.png"
           alt="Xander 的头像">
      <div>
        <h1>你好，我是 Xander</h1>
        <p class="subtitle">欢迎来到我的个人网站</p>
      </div>
    </header>

    <section>
      <h2>关于我</h2>
      <p>我正在学习如何使用 GitHub，并在这里记录自己的学习、项目和成长。</p>
    </section>

    <section>
      <h2>我的项目</h2>
      <p>项目内容即将更新。</p>
    </section>

    <section>
      <h2>联系我</h2>
      <p>
        <a href="https://github.com/Xander-CJJ">访问我的 GitHub</a>
      </p>
    </section>

    <footer>© 2026 Xander</footer>
  </main>
</body>
</html>
